apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcdollars-web
  namespace: mcdollars
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcdollars-web
  template:
    metadata:
      labels:
        app: mcdollars-web
    spec:
      containers:
        - name: web
          image: mcdollars-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mcdollars-web
  namespace: mcdollars
spec:
  selector:
    app: mcdollars-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
